version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: honeypot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: honeypot
      MYSQL_USER: ${DB_USERNAME:-honeypot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: honeypot-seaweedfs
    command: "server -dir=/data -s3 -s3.port=8333"
    ports:
      - "8333:8333"
      - "9333:9333"
      - "8888:8888"
    volumes:
      - seaweedfs-data:/data

volumes:
  mysql-data:
  seaweedfs-data:
