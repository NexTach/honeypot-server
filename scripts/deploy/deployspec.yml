version: 1.0

# snowykte0426/gsm-sv-deploy 라이프사이클.
# source_path(scripts/deploy)가 target_path 로 복사된 뒤 아래 스크립트가 순서대로 실행된다.
hooks:
  ApplicationStop:
    - location: application_stop.sh
      timeout: 120
  AfterInstall:
    - location: after_install.sh
      timeout: 900
  ApplicationStart:
    - location: application_start.sh
      timeout: 600
  ValidateService:
    - location: validate_service.sh
      timeout: 180
