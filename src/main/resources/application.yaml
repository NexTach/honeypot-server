spring:
  application:
    name: honeypot-server
  docker:
    compose:
      file: docker-compose.local.yml
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/honeypot?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

honeypot:
  upload:
    max-size: ${UPLOAD_MAX_SIZE:52428800}
  jwt:
    secret: ${JWT_SECRET:changeThisToAVeryLongSecretKeyForHMACSHA256AtLeast256BitsLong}
    access-ttl: 30m
    refresh-ttl: 14d
  frontend:
    # 콤마 구분으로 여러 개 지정 가능 (크로스 플랫폼 대응)
    origins: ${FRONTEND_ORIGINS:http://localhost:3000}
    redirect-uris: ${FRONTEND_REDIRECT_URIS:http://localhost:3000/callback}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:8333}
    access-key: ${S3_ACCESS_KEY:accessKey}
    secret-key: ${S3_SECRET_KEY:secretKey}
    bucket: ${S3_BUCKET:honeypot}
  media:
    # 공개 GIF /raw 응답의 Cache-Control max-age(초). 즉시성을 더 강하게 원하면 0.
    public-cache-ttl: ${MEDIA_PUBLIC_CACHE_TTL:60}

datagsm:
  oauth:
    client-id: ${DATAGSM_CLIENT_ID:clientId}
    client-secret: ${DATAGSM_CLIENT_SECRET:clientSecret}
    authorization-base-url: ${DATAGSM_AUTHORIZATION_BASE_URL:https://oauth.authorization.datagsm.kr}
    user-info-base-url: ${DATAGSM_USER_INFO_BASE_URL:https://oauth.resource.datagsm.kr}
    redirect-uri: ${DATAGSM_REDIRECT_URI:http://localhost:8080/v1/auth/datagsm/callback}

sdk:
  swagger:
    paths-to-match:
      - "/v1/**"
  # the-sdk 응답 래퍼는 null 바디(ResponseEntity<Void>) 를 204 로 덮어써 302 리다이렉트를
  # 무효화한다. DataGSM 로그인/콜백은 raw 302 리다이렉트라 래핑에서 제외한다.
  # (기본값을 대체하므로 swagger 경로도 함께 유지)
  response:
    not-wrapping-urls:
      - "/v3/api-docs/**"
      - "/v3/api-docs"
      - "/swagger-ui/**"
      - "/v1/auth/datagsm/login"
      - "/v1/auth/datagsm/callback"

# SpringDoc 에는 prefix 를 알리지 않는다(prefix 처리 시 api-docs 가 byte[] 직렬화되어
# the-sdk 응답 래핑과 ClassCastException 충돌). 대신 리버스 프록시 prefix 를 swagger-ui 가
# 호출할 URL 에만 수동으로 붙인다. 로컬은 빈 값(루트), 배포는 /honeypot.
springdoc:
  swagger-ui:
    config-url: ${SWAGGER_PREFIX:}/v3/api-docs/swagger-config
    url: ${SWAGGER_PREFIX:}/v3/api-docs
